<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>交通运输普法宣传</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header class="header" role="banner">
        <div class="header-brand">
            <span class="icon">🚗</span>
            交通运输普法
            <span class="sub">· 法治同行</span>
        </div>
        <nav class="nav-links" role="navigation" aria-label="主导航">
            <button class="nav-link active" data-page="home" id="navHome" aria-current="page">主页</button>
            <button class="nav-link" data-page="laws" id="navLaws">相关法条</button>
            <button class="nav-link" data-page="videos" id="navVideos">风采展示</button>
            <button class="nav-link" data-page="warnings" id="navWarnings">警示宣传</button>
        </nav>
    </header>

    <main>
        <!-- 主页 -->
        <section class="page active" id="pageHome" aria-label="主页">
            <div class="home-page">
                <div class="hero-image">
                    <div class="hero-text">
                        <h1>交通运输 · 法治护航</h1>
                        <p class="subtitle">普及交通法律法规，共建安全有序的出行环境</p>
                        <div class="contact-info-overlay">
                            <div class="contact-title">📞 服务及紧急救援电话</div>
                            <div class="contact-items">
                                <div class="contact-row">
                                    <span class="label">全国交通运输服务</span>
                                    <span class="number">12328</span>
                                </div>
                                <div class="contact-row">
                                    <span class="label">黑龙江省高速公路24小时路况咨询</span>
                                    <span class="number">0451-86607528</span>
                                </div>
                                <div class="contact-row">
                                    <span class="label">黑龙江省高速公路24小时路况咨询</span>
                                    <span class="number">0451-85961695</span>
                                </div>
                                <div class="contact-row">
                                    <span class="label">黑龙江省高速公路报警救援</span>
                                    <span class="number">12122</span>
                                </div>
                                <div class="contact-row">
                                    <span class="label">黑龙江省交投高速客服</span>
                                    <span class="number">96969</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 法条宣传 -->
        <section class="page" id="pageLaws" aria-label="法条宣传">
            <div class="laws-page">
                <div class="page-header">
                    <h2>📜 交通运输相关法条</h2>
                </div>
                <div class="search-box">
                    <input type="text" id="lawSearchInput" placeholder="🔍 搜索法条关键词..." />
                </div>
                <div class="laws-list" id="lawsList">
                    <!-- JS 动态生成 -->
                </div>
            </div>
        </section>

        <!-- 视频宣传（分局风采） -->
        <section class="page" id="pageVideos" aria-label="视频宣传">
            <div class="videos-page">
                <div class="page-header">
                    <h2>🎬 活动视频文章</h2>
                    <p>点击卡片，观看风采</p>
                </div>
                <div class="videos-list" id="videosList">
                    <!-- JS 动态生成 -->
                </div>
            </div>
        </section>

        <!-- 警示教育 -->
        <section class="page" id="pageWarnings" aria-label="警示教育">
            <div class="warnings-page">
                <div class="page-header">
                    <h2>⚠️ 交通运输警示宣传</h2>
                    <p>点击卡片，查看文章</p>
                </div>
                <div class="warnings-list" id="warningsList">
                    <!-- JS 动态生成 -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer" role="contentinfo">
        <span>© 2026 交通运输普法宣传 · 仅供学习参考</span>
    </footer>

    <button id="backToTop" title="回到顶部">↑</button>

    <script src="script.js"></script>
</body>
</html>
